<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Signup Page</title>

<style>
*{
    box-sizing:border-box;
}

body{
    background-color:#fff200;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#111;
}

div{
    width:45%;
    margin:auto;
    background-color:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px #ffe066;
}

input[type=text],
input[type=email],
input[type=password],
input[type=date]{
    width:100%;
    padding:14px 12px;
    margin:8px 0;
    border:2px solid #ffe066;
    border-radius:8px;
}

input[type=submit]{
    width:100%;
    background-color:#ffaf00;
    color:white;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

input[type=submit]:hover{
    background-color:#ff9800;
}

</style>

</head>

<body>

<h1>Snapchat 👻</h1>

<div>

<form action="/">

<h2 style="text-align:center;">Create a New Account</h2>

<p style="text-align:center;">It's quick and easy</p>

<hr>

<input type="text" placeholder="First Name" required>

<input type="text" placeholder="Last Name" required>

<label><b>Date of Birth</b></label>

<input type="date" required>

<label><b>Gender</b></label>

<br><br>

<input type="radio" name="gender"> Female

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Custom

<br><br>

<input type="email"
placeholder="Enter your Email Address"
required>

<input type="password"
placeholder="Enter your Password"
required>

<br>

<input type="checkbox" required>

By signing up, you agree to Snapchat's
<a href="#">Terms of Service</a>,
<a href="#">Privacy Policy</a> and
<a href="#">Cookies Policy</a>.

<br><br>

<input type="submit" value="SIGN UP">

</form>

</div>

</body>
</html>
